name: Run Data Pipeline

on:
  workflow_dispatch:
    inputs:
      years:
        description: 'Years to process (space-separated)'
        required: true
        default: '2023'
      dry_run:
        description: 'Dry run (check only, no DB write)'
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Run pipeline
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python pipeline/run_pipeline.py --years ${{ github.event.inputs.years }} $DRY_RUN_FLAG
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL_POOLED }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LOG_LEVEL: INFO
