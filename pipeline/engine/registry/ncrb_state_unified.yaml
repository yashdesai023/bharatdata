identity:
  id: ncrb_state_unified
  name: "NCRB State/Head Unified Crimes"
  publishing_body: "NCRB"
  update_frequency: "annual"

acquisition:
  method: manual_upload # Existing NCRB data is already local
  search_pattern: "data/raw/ncrb-crime-in-india/*/states-uts/*.xlsx"

extraction:
  format: xlsx
  metadata_patterns:
    year: "(20\\d{2})" # Extract year from the path (e.g., .../2023/...)
    geographic_level: "states-uts" # Fixed for this registry
  header_detection:
    method: pattern_match
    pattern: "^(State/UT|State|Crime Head)$"
  column_mapping:
    "State": {field: "state", type: "str"}
    "Crime Head": {field: "state", type: "str"}
    "Total.*IPC": {field: "total_ipc", type: "int"}
    "Total.*SLL": {field: "total_sll", type: "int"}
    "Total.*Women": {field: "total_women", type: "int"}
    "Total.*Children": {field: "total_children", type: "int"}
    "Total.*SCs?": {field: "total_sc", type: "int"}
    "Total.*STs?": {field: "total_st", type: "int"}
    "Total.*Cyber": {field: "total_cyber", type: "int"}
    "2021": {field: "total_ipc", type: "int"} # For historical head summaries
    "2022": {field: "total_ipc", type: "int"}
    "2023": {field: "total_ipc", type: "int"}

row_filters:
  summary_patterns: ["ALL INDIA", "TOTAL"]

storage:
  table_name: "state_crime_stats"
  unique_key: ["state", "year", "_source_id"]

validation:
  row_count: {min: 30}

normalization:
  null_handling:
    total_ipc: "zero"
    total_sll: "zero"
    total_women: "zero"
    total_children: "zero"
    total_sc: "zero"
    total_st: "zero"
    total_cyber: "zero"
