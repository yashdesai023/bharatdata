[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "bharatdata"
version = "0.1.0"
description = "Clean, queryable Indian public data SDK"
authors = [
    { name = "BharatData Team" }
]
dependencies = [
    "requests>=2.28.0",
    "pandas>=1.5.0"
]
requires-python = ">=3.8"

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "ruff>=0.1.0"
]
